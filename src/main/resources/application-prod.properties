# ───────────────────────────────────────────────────────
#  eFlow Service - Production Profile
#  Kích hoạt bằng: SPRING_PROFILES_ACTIVE=prod
# ───────────────────────────────────────────────────────

# ─── Server ─────────────────────────────────────────────
# Railway/Render inject biến PORT tự động
server.port=${PORT:8080}

# ─── CORS ───────────────────────────────────────────────
# Mặc định cho phép mọi subdomain của vercel.app (wildcard pattern).
# Sau khi biết URL Vercel cụ thể, set env var CORS_ALLOWED_ORIGINS
# trên Railway để giới hạn chặt hơn, ví dụ:
#   CORS_ALLOWED_ORIGINS=https://eflow-hr.vercel.app,https://eflow-hr-git-main-xxx.vercel.app
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://*.vercel.app}

# ─── H2 In-Memory Database ──────────────────────────────
# Giữ H2 cho demo đơn giản — dữ liệu reset khi restart.
# Để dùng MySQL persistent, uncomment phần MySQL bên dưới và comment H2.
spring.datasource.url=jdbc:h2:mem:eflowdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# ─── MySQL (Persistent - Railway MySQL plugin) ──────────
# Uncommnet khi add MySQL service trong Railway, Railway tự inject DATABASE_URL
# spring.datasource.url=${DATABASE_URL}
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# spring.datasource.username=${MYSQLUSER}
# spring.datasource.password=${MYSQLPASSWORD}
# spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
# spring.jpa.hibernate.ddl-auto=update

# ─── H2 Console ─────────────────────────────────────────
# Tắt H2 console trong production
spring.h2.console.enabled=false

# ─── JPA ────────────────────────────────────────────────
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# ─── Jackson ────────────────────────────────────────────
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.date-format=yyyy-MM-dd

# ─── Logging ────────────────────────────────────────────
logging.level.com.eflow=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.springframework.web=WARN
