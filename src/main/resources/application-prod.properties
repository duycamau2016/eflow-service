# ───────────────────────────────────────────────────────
#  eFlow Service - Production Profile
#  Kích hoạt bằng: SPRING_PROFILES_ACTIVE=prod
# ───────────────────────────────────────────────────────

# ─── Server ─────────────────────────────────────────────
# Railway inject biến PORT tự động
server.port=${PORT:8080}

# ─── CORS ───────────────────────────────────────────────
# Override bằng env var CORS_ALLOWED_ORIGINS trên Railway (phân cách bằng dấu phẩy)
# Mặc định cho phép tất cả origins (dùng setAllowedOriginPatterns nên an toàn với credentials)
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:*}

# ─── PostgreSQL (Render) ─────────────────────────────────
# BẮT BUỘC set 3 env var dưới đây trong Render Dashboard → service → Environment.
# Không có default → nếu thiếu env var, app sẽ FAIL khi khởi động (cố ý, để tránh
# âm thầm fallback về H2 hay lộ mật khẩu trong git).
#
# App chạy TRÊN Render → SPRING_DATASOURCE_URL dùng INTERNAL hostname:
#   jdbc:postgresql://dpg-d8t2l9reo5us73d91fc0-a/sw2_7sc8
# (KHÔNG có .oregon-postgres.render.com; web service phải cùng region Oregon với DB)
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection pool
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# ─── Flyway ─────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ─── H2 Console ─────────────────────────────────────────
spring.h2.console.enabled=false

# ─── MyBatis ────────────────────────────────────────────
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.type-aliases-package=com.eflow.entity
mybatis.configuration.map-underscore-to-camel-case=true

# ─── Jackson ────────────────────────────────────────────
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.date-format=yyyy-MM-dd

# ─── Logging ────────────────────────────────────────────
logging.level.com.eflow=INFO
logging.level.org.mybatis=WARN

logging.level.org.hibernate.SQL=WARN
logging.level.org.springframework.web=WARN
