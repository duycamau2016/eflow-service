# ───────────────────────────────────────────────────────
#  eFlow Service - Production Profile
#  Kích hoạt bằng: SPRING_PROFILES_ACTIVE=prod
# ───────────────────────────────────────────────────────

# ─── Server ─────────────────────────────────────────────
# Railway inject biến PORT tự động
server.port=${PORT:8080}

# ─── CORS ───────────────────────────────────────────────
# Override bằng env var CORS_ALLOWED_ORIGINS trên Railway (phân cách bằng dấu phẩy)
# Mặc định cho phép tất cả origins (dùng setAllowedOriginPatterns nên an toàn với credentials)
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:*}

# ─── PostgreSQL (Railway) ────────────────────────────────
# Railway tự inject: PGHOST, PGPORT, PGDATABASE, PGUSER, PGPASSWORD
# Ghép thành JDBC URL từ các biến Railway cung cấp sẵn
spring.datasource.url=jdbc:postgresql://${PGHOST}:${PGPORT:5432}/${PGDATABASE}
spring.datasource.username=${PGUSER}
spring.datasource.password=${PGPASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection pool
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# ─── Flyway ─────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ─── H2 Console ─────────────────────────────────────────
spring.h2.console.enabled=false

# ─── MyBatis ────────────────────────────────────────────
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.type-aliases-package=com.eflow.entity
mybatis.configuration.map-underscore-to-camel-case=true

# ─── Jackson ────────────────────────────────────────────
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.date-format=yyyy-MM-dd

# ─── Logging ────────────────────────────────────────────
logging.level.com.eflow=INFO
logging.level.org.mybatis=WARN

logging.level.org.hibernate.SQL=WARN
logging.level.org.springframework.web=WARN
