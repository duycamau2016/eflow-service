# ───────────────────────────────────────────
#  eFlow Service - Application Configuration
# ───────────────────────────────────────────
spring.application.name=eflow-service
# Dùng biến PORT nếu có (Railway/Render tự inject), fallback về 8099 khi local
server.port=${PORT:8099}

# ─── CORS ───────────────────────────────────────────
# Danh sách origins cho phép, phân cách bởi dấu phẩy.
# Profile prod sẽ override giá trị này (xem application-prod.properties).
app.cors.allowed-origins=http://localhost:4200,http://localhost:4201,http://localhost:4202

# ─── H2 In-Memory Database (Development) ───
spring.datasource.url=jdbc:h2:mem:eflowdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Web Console (http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# ─── JPA / Hibernate ───
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ─── MySQL (Production - uncomment & comment out H2 section) ───
# spring.datasource.url=jdbc:mysql://localhost:3306/eflowdb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# spring.datasource.username=root
# spring.datasource.password=your_password
# spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
# spring.jpa.hibernate.ddl-auto=update

# ─── Jackson ───
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.date-format=yyyy-MM-dd

# ─── Logging ───
logging.level.com.eflow=DEBUG
logging.level.org.hibernate.SQL=DEBUG
