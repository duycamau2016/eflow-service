# ───────────────────────────────────────────
#  eFlow Service - Application Configuration
# ───────────────────────────────────────────
spring.application.name=eflow-service
# Dùng biến PORT nếu có (Railway/Render tự inject), fallback về 8099 khi local
server.port=${PORT:8099}

# ─── CORS ───────────────────────────────────────────
# Danh sách origins cho phép, phân cách bởi dấu phẩy.
# Profile prod sẽ override giá trị này (xem application-prod.properties).
app.cors.allowed-origins=http://localhost:4200,http://localhost:4201,http://localhost:4202,https://*.vercel.app

# ─── H2 In-Memory Database (Development - PostgreSQL mode) ───
# MODE=PostgreSQL: H2 giả lập cú pháp PostgreSQL (SERIAL, ILIKE, etc.)
spring.datasource.url=jdbc:h2:mem:eflowdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Web Console (http://localhost:8099/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# ─── Flyway ───────────────────────────────────
# Flyway tự động chạy scripts trong db/migration khi khởi động
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ─── MyBatis ───────────────────────────────────
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.type-aliases-package=com.eflow.entity
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.configuration.default-fetch-size=100
mybatis.configuration.default-statement-timeout=30

# ─── Jackson ───
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.date-format=yyyy-MM-dd

# ─── Logging ───
logging.level.com.eflow=DEBUG
logging.level.org.mybatis=DEBUG
